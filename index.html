<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flickr</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23141414'/%3E%3Crect x='6' y='6' width='52' height='14' fill='%23e50914'/%3E%3Cg fill='%23141414'%3E%3Crect x='10' y='9' width='6' height='8'/%3E%3Crect x='22' y='9' width='6' height='8'/%3E%3Crect x='34' y='9' width='6' height='8'/%3E%3Crect x='46' y='9' width='6' height='8'/%3E%3C/g%3E%3Cpolygon points='26,30 26,50 44,40' fill='%23f0ece4'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- AdSense: replace ca-pub-XXXXXXXXXXXXXXXX with your real publisher ID once approved -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: background 0.25s, color 0.25s; -webkit-font-smoothing: antialiased; }

    :root {
      --bg: #f0ece4; --surface: #e6e0d4; --card: #fffdf8;
      --border: #d8d0c0; --text: #161412; --muted: #6f655a;
      --accent: #e50914; --accent-dark: #b30710; --gold: #c9a227;
      --shadow: rgba(20,16,10,0.10);
    }
    .dark {
      --bg: #0a0a0a; --surface: #161412; --card: #161412;
      --border: #2a2620; --text: #f0ece4; --muted: #948a7c;
      --shadow: rgba(0,0,0,0.45);
    }

    h1, h2, .brand-word, .modal-banner-text h2 { font-family: 'Bebas Neue', 'Inter', sans-serif; letter-spacing: 0.5px; }

    /* ---------- HERO ---------- */
    .hero { background: #0a0a0a; padding: 1.75rem 1.5rem 1.5rem; position: relative; overflow: hidden; }
    .hero::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,255,255,0.025) 38px 40px);
      pointer-events: none;
    }
    .hero-top { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 46px; height: 46px; flex-shrink: 0; }
    .brand-text h1 { font-size: 34px; font-weight: 400; color: #f0ece4; line-height: 1; }
    .brand-text p { color: #948a7c; font-size: 12.5px; margin-top: 3px; letter-spacing: 0.3px; }
    .dark-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 14px; color: #f0ece4; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .dark-btn:hover { background: rgba(255,255,255,0.14); }
    .nav-links { display: flex; gap: 18px; align-items: center; position: relative; z-index: 1; }
    .nav-links a { color: #c9bfaf; font-size: 13.5px; text-decoration: none; font-weight: 500; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: #f0ece4; }
    .site-footer { border-top: 1px solid var(--border); padding: 1.75rem 1.5rem; text-align: center; color: var(--muted); font-size: 12.5px; }
    .site-footer a { color: var(--muted); text-decoration: none; }
    .site-footer a:hover { color: var(--accent); }

    .search-row { display: flex; gap: 8px; margin-top: 1.25rem; position: relative; z-index: 1; }
    .search-row input { flex: 1; padding: 0 14px; height: 44px; border-radius: 8px; border: 1px solid #2a2620; background: #161412; color: #f0ece4; font-size: 14px; }
    .search-row input::placeholder { color: #6f655a; }
    .search-row input:focus { outline: none; border-color: var(--accent); }
    .search-row button { padding: 0 22px; height: 44px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; cursor: pointer; font-weight: 600; letter-spacing: 0.3px; transition: background 0.15s; }
    .search-row button:hover { background: var(--accent-dark); }

    .suggestions { position: absolute; top: 48px; left: 0; right: 78px; background: #161412; border: 1px solid #2a2620; border-radius: 8px; z-index: 50; overflow: hidden; display: none; box-shadow: 0 12px 28px rgba(0,0,0,0.5); }
    .suggestion-item { padding: 10px 14px; cursor: pointer; font-size: 13px; color: #f0ece4; border-bottom: 1px solid #221f1a; display: flex; gap: 10px; align-items: center; }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: #221f1a; }
    .suggestion-item img { width: 26px; height: 38px; object-fit: cover; border-radius: 3px; background: #2a2620; }
    .suggestion-year { color: #6f655a; font-size: 12px; margin-left: auto; }

    /* ---------- GENRES ---------- */
    .genres { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.7rem 1.5rem; display: flex; gap: 8px; overflow-x: auto; }
    .genres::-webkit-scrollbar { display: none; }
    .genre-btn { padding: 5px 13px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 500; transition: all 0.15s; }
    .genre-btn:hover { border-color: var(--accent); color: var(--text); }
    .genre-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ---------- TABS ---------- */
    .tabs-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 0 1.5rem; background: var(--bg); }
    .tabs { display: flex; }
    .tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); font-weight: 500; transition: color 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { border-bottom-color: var(--accent); color: var(--text); font-weight: 600; }
    .filters { display: flex; gap: 8px; align-items: center; }
    .filters select { font-size: 12px; padding: 6px 9px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; }

    /* ---------- GRID / CARDS ---------- */
    .content { padding: 1.25rem 1.5rem 2.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
    .card { border-radius: 10px; overflow: hidden; cursor: pointer; background: var(--card); transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 1px 0 var(--border), 0 6px 16px var(--shadow); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 1px 0 var(--border), 0 14px 28px var(--shadow); }
    .card-poster-wrap { position: relative; }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface); }
    .card-rating-badge { position: absolute; top: 8px; right: 8px; background: rgba(10,10,10,0.78); color: var(--gold); font-size: 11px; font-weight: 600; padding: 3px 7px; border-radius: 5px; display: flex; align-items: center; gap: 3px; }
    .card-info { padding: 10px 11px 11px; }
    .card-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

    .empty { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }
    .empty-mark { width: 56px; height: 56px; margin: 0 auto 14px; opacity: 0.55; }
    .empty p { font-size: 13.5px; }
    .loader-row { display: flex; align-items: center; gap: 10px; padding: 1rem 0; color: var(--muted); font-size: 13.5px; }
    .spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--accent); animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: var(--accent); font-size: 13.5px; padding: 1rem 0; }

    /* ---------- WATCHLIST ---------- */
    .wl-item { display: flex; gap: 13px; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .wl-poster { width: 42px; height: 60px; object-fit: cover; border-radius: 5px; background: var(--surface); flex-shrink: 0; }
    .wl-title { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .wl-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .wl-remove { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--muted); padding: 5px 11px; font-size: 12px; margin-left: auto; transition: all 0.15s; }
    .wl-remove:hover { border-color: var(--accent); color: var(--accent); }

    /* ---------- MODAL ---------- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(8,6,4,0.8); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal { background: var(--card); border-radius: 14px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .modal-banner { position: relative; }
    .modal-banner img { width: 100%; height: 210px; object-fit: cover; border-radius: 14px 14px 0 0; display: block; background: var(--surface); }
    .modal-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(8,6,4,0.92) 0%, rgba(8,6,4,0.15) 65%, transparent 100%); border-radius: 14px 14px 0 0; }
    .modal-close { position: absolute; top: 10px; right: 10px; background: rgba(8,6,4,0.55); border: none; border-radius: 50%; width: 30px; height: 30px; color: #fff; font-size: 16px; cursor: pointer; line-height: 1; }
    .modal-banner-text { position: absolute; bottom: 14px; left: 16px; right: 16px; }
    .modal-banner-text h2 { font-size: 24px; font-weight: 400; color: #fff; letter-spacing: 0.4px; }
    .modal-banner-text p { font-size: 12.5px; color: #c9bfaf; margin-top: 3px; }
    .modal-body { padding: 1.1rem 1.4rem 1.4rem; }
    .stars-row { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
    .stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
    .stars-sub { font-size: 12.5px; color: var(--muted); }
    .genre-tags { margin-bottom: 12px; }
    .genre-tag { display: inline-block; padding: 4px 11px; border-radius: 99px; font-size: 11px; font-weight: 500; background: var(--surface); color: var(--muted); margin-right: 6px; margin-bottom: 5px; }
    .plot { font-size: 13.5px; color: var(--muted); line-height: 1.75; margin-bottom: 14px; }
    .meta-line { font-size: 13px; margin-bottom: 7px; color: var(--text); }
    .meta-line strong { font-weight: 600; }
    .meta-line span { color: var(--muted); }
    .watch-box { padding: 11px 13px; background: var(--surface); border-radius: 8px; margin-bottom: 14px; border-left: 3px solid var(--gold); }
    .watch-box-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .watch-box p { font-size: 12.5px; color: var(--muted); }
    .watch-box a { color: var(--accent); font-weight: 600; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { border: 1px solid var(--border); background: transparent; color: var(--text); }
    .btn-secondary:hover { border-color: var(--muted); }
    .btn-saved { background: var(--text); color: var(--bg); }

    /* ---------- AD SLOTS ---------- */
    .ad-slot { background: var(--card); border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .ad-slot::before { content: "ad"; position: absolute; top: 6px; left: 9px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); opacity: 0.6; }
    .ad-slot-banner { margin: 0 1.5rem 1.25rem; min-height: 90px; }
    .ad-slot-grid { grid-column: 1 / -1; min-height: 120px; }
    .ad-slot-modal { margin: 0 0 14px; min-height: 90px; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="10" fill="#161412"/>
        <rect x="6" y="6" width="52" height="14" rx="2" fill="#e50914"/>
        <g fill="#161412">
          <rect x="10" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="22" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="34" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="46" y="9" width="6" height="8" transform="skewX(-12)"/>
        </g>
        <rect x="6" y="24" width="52" height="34" rx="2" fill="none" stroke="#e50914" stroke-width="1.5"/>
        <polygon points="26,32 26,50 44,41" fill="#f0ece4"/>
      </svg>
      <div class="brand-text">
        <h1>FLICKR</h1>
        <p>free movie discovery &middot; no piracy &middot; just vibes</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="./index.html" class="active">search</a>
      <a href="./blog/index.html">blog</a>
      <button class="dark-btn" onclick="toggleDark()" id="darkBtn">🌙 dark</button>
    </div>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="search any movie..." onkeydown="if(event.key==='Enter') doSearch()" oninput="handleInput(this.value)" />
    <button onclick="doSearch()">search</button>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>

<div class="genres" id="genres"></div>

<div class="ad-slot ad-slot-banner">
  <!-- Replace with your real <ins class="adsbygoogle"> unit once AdSense is approved -->
  <ins class="adsbygoogle" style="display:block;width:100%;height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000000" data-ad-format="horizontal"></ins>
</div>

<div class="tabs-row">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('search', this)">search</div>
    <div class="tab" onclick="switchTab('watchlist', this)" id="wlTab">watchlist (0)</div>
  </div>
  <div class="filters">
    <select onchange="minRating=+this.value; renderResults()">
      <option value="0">all ratings</option>
      <option value="6">6+ ⭐</option>
      <option value="7">7+ ⭐</option>
      <option value="8">8+ ⭐</option>
    </select>
    <select onchange="sortBy=this.value; renderResults()">
      <option value="default">default</option>
      <option value="rating">by rating</option>
      <option value="year">by year</option>
    </select>
  </div>
</div>

<div class="content">
  <div id="tab-search">
    <div id="status"></div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="tab-watchlist" style="display:none">
    <div id="wlContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<div class="site-footer">
  <p>&copy; 2026 Flickr &middot; <a href="./blog/index.html">read the blog</a></p>
</div>

<script>
  const apiKey = '587862ae';
  let results = [];
  let watchlist = [];
  let genreFilter = '';
  let minRating = 0;
  let sortBy = 'default';
  let suggestTimer = null;
  let isDark = false;
  let selectedMovie = null;

  const GENRES = ['Action','Comedy','Drama','Horror','Romance','Thriller','Sci-Fi','Animation','Crime','Adventure'];
  const API = 'https://www.omdbapi.com';

  // Fills any <ins class="adsbygoogle"> slot that hasn't been filled yet.
  // Safe to call repeatedly — skips slots AdSense already initialized.
  function pushAd() {
    try {
      document.querySelectorAll('ins.adsbygoogle').forEach(slot => {
        if (!slot.getAttribute('data-ad-status')) {
          (window.adsbygoogle = window.adsbygoogle || []).push({});
        }
      });
    } catch (e) { /* AdSense script not loaded yet or blocked — fail silently */ }
  }

  const EMPTY_MARK = `<svg class="empty-mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="10" fill="var(--surface)"/>
    <rect x="6" y="6" width="52" height="14" rx="2" fill="var(--accent)"/>
    <g fill="var(--surface)">
      <rect x="10" y="9" width="6" height="8" transform="skewX(-12)"/>
      <rect x="22" y="9" width="6" height="8" transform="skewX(-12)"/>
      <rect x="34" y="9" width="6" height="8" transform="skewX(-12)"/>
      <rect x="46" y="9" width="6" height="8" transform="skewX(-12)"/>
    </g>
    <rect x="6" y="24" width="52" height="34" rx="2" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    <polygon points="26,32 26,50 44,41" fill="var(--muted)"/>
  </svg>`;

  const genreContainer = document.getElementById('genres');
  const allBtn = document.createElement('button');
  allBtn.className = 'genre-btn active';
  allBtn.textContent = 'all';
  allBtn.onclick = () => { genreFilter = ''; document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); doSearch(); };
  genreContainer.appendChild(allBtn);

  GENRES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genre-btn';
    btn.textContent = g;
    btn.onclick = () => {
      genreFilter = g === genreFilter ? '' : g;
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.toggle('active', genreFilter === g);
      if (!genreFilter) allBtn.classList.add('active');
      doSearch();
    };
    genreContainer.appendChild(btn);
  });

  function toggleDark() {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    document.getElementById('darkBtn').textContent = isDark ? '☀️ light' : '🌙 dark';
  }

  function handleInput(v) {
    clearTimeout(suggestTimer);
    if (v.length > 1) {
      suggestTimer = setTimeout(() => fetchSuggestions(v), 400);
    } else {
      document.getElementById('suggestions').style.display = 'none';
    }
  }

  async function fetchSuggestions(q) {
    try {
      const r = await fetch(`${API}/?s=${encodeURIComponent(q)}&type=movie&apikey=${apiKey}`);
      const d = await r.json();
      if (d.Response === 'True') showSuggestions(d.Search.slice(0, 5));
    } catch {}
  }

  function showSuggestions(movies) {
    const box = document.getElementById('suggestions');
    box.innerHTML = movies.map(m => `
      <div class="suggestion-item" onclick="selectSuggestion('${m.Title.replace(/'/g,"\\'")}')">
        <img src="${m.Poster !== 'N/A' ? m.Poster : ''}" onerror="this.style.background='#2a2620';this.removeAttribute('src')" />
        <span>${m.Title}</span>
        <span class="suggestion-year">${m.Year}</span>
      </div>
    `).join('');
    box.style.display = 'block';
  }

  function selectSuggestion(title) {
    document.getElementById('searchInput').value = title;
    document.getElementById('suggestions').style.display = 'none';
    doSearch(title);
  }

  async function doSearch(q) {
    q = q || document.getElementById('searchInput').value.trim();
    document.getElementById('suggestions').style.display = 'none';
    const searchQ = q || genreFilter || 'movie';
    setStatus('loader', 'searching...');
    document.getElementById('grid').innerHTML = '';
    try {
      const r = await fetch(`${API}/?s=${encodeURIComponent(searchQ)}&type=movie&apikey=${apiKey}`);
      const d = await r.json();
      if (d.Response === 'False') { setStatus('error', d.Error); results = []; renderResults(); return; }
      const detailed = await Promise.all(
        d.Search.map(m => fetch(`${API}/?i=${m.imdbID}&apikey=${apiKey}`).then(r => r.json()))
      );
      results = detailed;
      setStatus('', '');
      renderResults();
    } catch { setStatus('error', 'search failed — check your connection'); }
  }

  function setStatus(type, msg) {
    const s = document.getElementById('status');
    if (type === 'loader') {
      s.className = '';
      s.innerHTML = `<div class="loader-row"><div class="spinner"></div><span>${msg}</span></div>`;
    } else if (type === 'error') {
      s.className = 'error';
      s.textContent = msg;
    } else {
      s.className = '';
      s.innerHTML = '';
    }
  }

  function getSorted() {
    let list = results.filter(m => {
      const r = parseFloat(m.imdbRating);
      return isNaN(r) || r >= minRating;
    });
    if (sortBy === 'rating') list.sort((a,b) => parseFloat(b.imdbRating||0) - parseFloat(a.imdbRating||0));
    if (sortBy === 'year') list.sort((a,b) => parseInt(b.Year||0) - parseInt(a.Year||0));
    return list;
  }

  function renderResults() {
    const grid = document.getElementById('grid');
    const list = getSorted();
    if (!list.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">${EMPTY_MARK}<p>search a movie or pick a genre to start browsing</p></div>`;
      return;
    }
    grid.innerHTML = list.map((m, i) => {
      const card = `
      <div class="card" onclick="openModal('${m.imdbID}')">
        <div class="card-poster-wrap">
          <img src="${m.Poster !== 'N/A' ? m.Poster : ''}" alt="${m.Title}" onerror="this.style.background='var(--surface)';this.removeAttribute('src')" />
          ${m.imdbRating && m.imdbRating !== 'N/A' ? `<div class="card-rating-badge">★ ${m.imdbRating}</div>` : ''}
        </div>
        <div class="card-info">
          <div class="card-title">${m.Title}</div>
          <div class="card-meta">${m.Year}</div>
        </div>
      </div>`;
      const adAfter8 = (i > 0 && i % 8 === 7) ? `
      <div class="ad-slot ad-slot-grid">
        <ins class="adsbygoogle" style="display:block;width:100%;height:100%" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000002" data-ad-format="fluid" data-ad-layout-key="-6t+ed+2i-1n-4w"></ins>
      </div>` : '';
      return card + adAfter8;
    }).join('');
    pushAd();
  }

  async function openModal(imdbID) {
    document.getElementById('modalOverlay').style.display = 'flex';
    document.getElementById('modal').innerHTML = '<div class="loader-row" style="padding:2.5rem"><div class="spinner"></div><span>loading...</span></div>';
    const r = await fetch(`${API}/?i=${imdbID}&plot=full&apikey=${apiKey}`);
    const m = await r.json();
    selectedMovie = m;
    const inWL = watchlist.some(w => w.imdbID === m.imdbID);
    const stars = renderStars(m.imdbRating);
    const genres = m.Genre ? m.Genre.split(', ').map(g => `<span class="genre-tag">${g}</span>`).join('') : '';
    document.getElementById('modal').innerHTML = `
      <div class="modal-banner">
        <img src="${m.Poster !== 'N/A' ? m.Poster : ''}" onerror="this.style.background='var(--surface)'" />
        <div class="modal-banner-overlay"></div>
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-banner-text">
          <h2>${m.Title}</h2>
          <p>${m.Year} · ${m.Runtime} · ${m.Rated}</p>
        </div>
      </div>
      <div class="modal-body">
        <div class="stars-row">
          <div class="stars">${stars}</div>
          <span class="stars-sub">${m.imdbRating}/10 (${m.imdbVotes} votes)</span>
        </div>
        <div class="genre-tags">${genres}</div>
        <p class="plot">${m.Plot}</p>
        ${m.Director !== 'N/A' ? `<p class="meta-line"><strong>director</strong> <span>${m.Director}</span></p>` : ''}
        ${m.Actors !== 'N/A' ? `<p class="meta-line"><strong>cast</strong> <span>${m.Actors}</span></p>` : ''}
        <div class="watch-box">
          <div class="watch-box-title">where to watch</div>
          <p>find "<strong>${m.Title}</strong>" on <a href="https://www.justwatch.com/us/search?q=${encodeURIComponent(m.Title)}" target="_blank">JustWatch</a> for free & legal streaming</p>
        </div>
        <div class="ad-slot ad-slot-modal">
          <ins class="adsbygoogle" style="display:block;width:100%;height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000001" data-ad-format="horizontal"></ins>
        </div>
        <div class="modal-actions">
          <button class="btn ${inWL ? 'btn-saved' : 'btn-primary'}" onclick="toggleWatchlist()">${inWL ? '✓ saved' : '+ watchlist'}</button>
          <button class="btn btn-secondary" onclick="copyTrailer('${m.Title.replace(/'/g,"\\'")}')">▶ trailer</button>
          <button class="btn btn-secondary" onclick="closeModal()">close</button>
        </div>
      </div>
    `;
    pushAd();
  }

  function copyTrailer(title) {
    const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(title + ' official trailer')}`;
    navigator.clipboard.writeText(url);
    alert('trailer link copied! paste it in your browser 🎬');
  }

  function renderStars(rating) {
    const score = Math.round((parseFloat(rating) / 10) * 5);
    return Array.from({length: 5}, (_,i) => `<span style="color:${i < score ? 'var(--gold)' : 'var(--border)'}">★</span>`).join('');
  }

  function toggleWatchlist() {
    const m = selectedMovie;
    const idx = watchlist.findIndex(w => w.imdbID === m.imdbID);
    if (idx > -1) watchlist.splice(idx, 1);
    else watchlist.push(m);
    updateWLCount();
    renderWatchlist();
    closeModal();
  }

  function updateWLCount() {
    document.getElementById('wlTab').textContent = `watchlist (${watchlist.length})`;
  }

  function renderWatchlist() {
    const c = document.getElementById('wlContent');
    if (!watchlist.length) {
      c.innerHTML = `<div class="empty">${EMPTY_MARK}<p>nothing saved yet — movies you bookmark will show up here</p></div>`;
      return;
    }
    c.innerHTML = watchlist.map(m => `
      <div class="wl-item">
        <img class="wl-poster" src="${m.Poster !== 'N/A' ? m.Poster : ''}" onerror="this.style.background='var(--surface)'" />
        <div>
          <div class="wl-title">${m.Title}</div>
          <div class="wl-sub">${m.Year} ${m.imdbRating !== 'N/A' ? '· ★ ' + m.imdbRating : ''}</div>
        </div>
        <button class="wl-remove" onclick="removeWL('${m.imdbID}')">remove</button>
      </div>
    `).join('');
  }

  function removeWL(id) {
    watchlist = watchlist.filter(w => w.imdbID !== id);
    updateWLCount();
    renderWatchlist();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').style.display = 'none';
    }
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-search').style.display = name === 'search' ? 'block' : 'none';
    document.getElementById('tab-watchlist').style.display = name === 'watchlist' ? 'block' : 'none';
  }

  renderResults();
  renderWatchlist();
  pushAd();
</script>
</body>
</html>
