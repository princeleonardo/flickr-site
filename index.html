<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flickr — Movie Discovery</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23141414'/%3E%3Crect x='6' y='6' width='52' height='14' fill='%23e50914'/%3E%3Cg fill='%23141414'%3E%3Crect x='10' y='9' width='6' height='8'/%3E%3Crect x='22' y='9' width='6' height='8'/%3E%3Crect x='34' y='9' width='6' height='8'/%3E%3Crect x='46' y='9' width='6' height='8'/%3E%3C/g%3E%3Cpolygon points='26,30 26,50 44,40' fill='%23f0ece4'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.25s, color 0.25s; -webkit-font-smoothing: antialiased; }
    :root {
      --bg: #f0ece4; --surface: #e6e0d4; --card: #fffdf8;
      --border: #d8d0c0; --text: #161412; --muted: #6f655a;
      --accent: #e50914; --accent-dark: #b30710; --gold: #c9a227;
      --shadow: rgba(20,16,10,0.10);
    }
    .dark {
      --bg: #0a0a0a; --surface: #161412; --card: #1a1814;
      --border: #2a2620; --text: #f0ece4; --muted: #948a7c;
      --shadow: rgba(0,0,0,0.5);
    }
    h1,h2,.modal-title { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.5px; }

    /* HERO */
    .hero { background: #0a0a0a; padding: 1.5rem 1.5rem 1.25rem; position: relative; overflow: visible; z-index: 200; }
    .hero::before { content:""; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0 38px,rgba(255,255,255,0.025) 38px 40px); pointer-events:none; }
    .hero-top { display:flex; justify-content:space-between; align-items:center; position:relative; z-index:201; flex-wrap:wrap; gap:10px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-logo { width:44px; height:44px; flex-shrink:0; }
    .brand-text h1 { font-size:32px; font-weight:400; color:#f0ece4; line-height:1; }
    .brand-text p { color:#948a7c; font-size:12px; margin-top:3px; }
    .nav-links { display:flex; gap:16px; align-items:center; }
    .nav-links a { color:#c9bfaf; font-size:13px; text-decoration:none; font-weight:500; transition:color 0.15s; }
    .nav-links a:hover { color:#f0ece4; }
    .dark-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:7px 13px; color:#f0ece4; cursor:pointer; font-size:13px; transition:background 0.15s; }
    .dark-btn:hover { background:rgba(255,255,255,0.15); }

    /* SEARCH — z-index must be above everything below hero */
    .search-wrap { position:relative; z-index:202; margin-top:1.1rem; }
    .search-row { display:flex; gap:8px; }
    .search-row input { flex:1; padding:0 14px; height:44px; border-radius:8px; border:1px solid #2a2620; background:#161412; color:#f0ece4; font-size:14px; outline:none; transition:border-color 0.15s; }
    .search-row input:focus { border-color:var(--accent); }
    .search-row input::placeholder { color:#6f655a; }
    .search-row button { padding:0 22px; height:44px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
    .search-row button:hover { background:var(--accent-dark); }
    .suggestions { position:absolute; top:48px; left:0; right:0; background:#161412; border:1px solid #2a2620; border-radius:10px; z-index:203; overflow:hidden; display:none; box-shadow:0 16px 40px rgba(0,0,0,0.6); }
    .sug-item { padding:10px 14px; cursor:pointer; font-size:13px; color:#f0ece4; border-bottom:1px solid #221f1a; display:flex; gap:10px; align-items:center; transition:background 0.1s; }
    .sug-item:last-child { border-bottom:none; }
    .sug-item:hover { background:#221f1a; }
    .sug-item img { width:26px; height:38px; object-fit:cover; border-radius:3px; background:#2a2620; flex-shrink:0; }
    .sug-year { color:#6f655a; font-size:12px; margin-left:auto; }

    /* GENRES */
    .genres { background:var(--surface); border-bottom:1px solid var(--border); padding:0.65rem 1.5rem; display:flex; gap:8px; overflow-x:auto; position:relative; z-index:1; }
    .genres::-webkit-scrollbar { display:none; }
    .genre-btn { padding:5px 13px; border-radius:99px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; font-weight:500; transition:all 0.15s; flex-shrink:0; }
    .genre-btn:hover { border-color:var(--accent); color:var(--text); }
    .genre-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* TABS */
    .tabs-row { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding:0 1.5rem; background:var(--bg); position:relative; z-index:1; }
    .tabs { display:flex; }
    .tab { padding:11px 15px; font-size:13px; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); font-weight:500; transition:color 0.15s; }
    .tab:hover { color:var(--text); }
    .tab.active { border-bottom-color:var(--accent); color:var(--text); font-weight:600; }
    .filters { display:flex; gap:8px; align-items:center; }
    .filters select { font-size:12px; padding:5px 8px; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; }

    /* SECTION LABEL */
    .section-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .section-label::after { content:""; flex:1; height:1px; background:var(--border); }

    /* GRID */
    .content { padding:1.25rem 1.5rem 3rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:16px; }
    .card { border-radius:10px; overflow:hidden; cursor:pointer; background:var(--card); box-shadow:0 1px 0 var(--border),0 4px 14px var(--shadow); transition:transform 0.18s,box-shadow 0.18s; }
    .card:hover { transform:translateY(-4px); box-shadow:0 1px 0 var(--border),0 14px 28px var(--shadow); }
    .card-poster-wrap { position:relative; }
    .card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:var(--surface); }
    .card-badge { position:absolute; top:7px; right:7px; background:rgba(10,10,10,0.82); color:var(--gold); font-size:11px; font-weight:700; padding:3px 7px; border-radius:5px; }
    .card-info { padding:9px 10px 11px; }
    .card-title { font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
    .card-meta { font-size:11px; color:var(--muted); margin-top:2px; }

    /* AD SLOTS */
    .ad-slot { background:var(--card); border:1px dashed var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; min-height:90px; }
    .ad-slot::before { content:"ad"; position:absolute; top:5px; left:8px; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); opacity:0.5; }
    .ad-banner { margin:0 0 1.25rem; }
    .ad-grid { grid-column:1/-1; }

    /* EMPTY / LOADER */
    .empty { text-align:center; padding:3rem 1rem; color:var(--muted); grid-column:1/-1; }
    .empty svg { width:52px; height:52px; margin:0 auto 12px; display:block; opacity:0.45; }
    .empty p { font-size:13.5px; }
    .loader-row { display:flex; align-items:center; gap:10px; padding:1rem 0; color:var(--muted); font-size:13.5px; }
    .spinner { width:16px; height:16px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:spin 0.7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .err { color:var(--accent); font-size:13.5px; padding:1rem 0; }

    /* WATCHLIST */
    .wl-item { display:flex; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .wl-poster { width:40px; height:58px; object-fit:cover; border-radius:5px; background:var(--surface); flex-shrink:0; }
    .wl-title { font-size:13px; font-weight:600; color:var(--text); }
    .wl-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .wl-remove { background:none; border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--muted); padding:4px 10px; font-size:12px; margin-left:auto; transition:all 0.15s; flex-shrink:0; }
    .wl-remove:hover { border-color:var(--accent); color:var(--accent); }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(6,4,2,0.85); display:none; align-items:center; justify-content:center; z-index:300; padding:1rem; }
    .modal { background:var(--card); border-radius:16px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 28px 70px rgba(0,0,0,0.6); }
    /* trailer embed */
    .trailer-wrap { position:relative; width:100%; padding-top:56.25%; background:#000; border-radius:16px 16px 0 0; overflow:hidden; }
    .trailer-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
    .trailer-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .trailer-play-btn { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; cursor:pointer; background:rgba(0,0,0,0.35); transition:background 0.2s; z-index:8; }
    .trailer-play-btn:hover { background:rgba(0,0,0,0.15); }
    .trailer-play-btn svg { width:64px; height:64px; filter:drop-shadow(0 2px 12px rgba(0,0,0,0.7)); pointer-events:none; }
    .modal-close { position:absolute; top:10px; right:10px; background:rgba(6,4,2,0.6); border:none; border-radius:50%; width:32px; height:32px; color:#fff; font-size:18px; cursor:pointer; z-index:20; line-height:1; display:flex; align-items:center; justify-content:center; }
    .modal-banner-text { position:absolute; bottom:14px; left:16px; right:16px; z-index:9; pointer-events:none; }
    .modal-banner-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(6,4,2,0.92) 0%,rgba(6,4,2,0.1) 60%,transparent 100%); z-index:3; pointer-events:none; }
    .modal-title { font-size:26px; color:#fff; line-height:1.1; }
    .modal-sub { font-size:12.5px; color:#c9bfaf; margin-top:3px; }
    .modal-body { padding:1.1rem 1.4rem 1.5rem; }
    .stars-row { display:flex; align-items:center; gap:8px; margin-bottom:11px; }
    .stars span { font-size:15px; }
    .stars-sub { font-size:12.5px; color:var(--muted); }
    .genre-tags { margin-bottom:11px; display:flex; flex-wrap:wrap; gap:5px; }
    .genre-tag { padding:4px 11px; border-radius:99px; font-size:11px; font-weight:500; background:var(--surface); color:var(--muted); }
    .plot { font-size:13.5px; color:var(--muted); line-height:1.75; margin-bottom:13px; }
    .meta-line { font-size:13px; margin-bottom:6px; color:var(--text); }
    .meta-line strong { font-weight:600; }
    .meta-line span { color:var(--muted); }

    /* CAST */
    .cast-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
    .cast-scroll::-webkit-scrollbar { display:none; }
    .cast-card { flex-shrink:0; width:64px; text-align:center; }
    .cast-card img { width:56px; height:56px; border-radius:50%; object-fit:cover; background:var(--surface); display:block; margin:0 auto 5px; border:2px solid var(--border); }
    .cast-name { font-size:10.5px; color:var(--text); font-weight:600; line-height:1.3; }
    .cast-char { font-size:10px; color:var(--muted); }

    /* PROVIDERS */
    .providers-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
    .provider-chip { display:flex; align-items:center; gap:6px; background:var(--surface); border-radius:8px; padding:5px 10px; font-size:12px; font-weight:500; color:var(--text); border:1px solid var(--border); text-decoration:none; transition:border-color 0.15s; cursor:pointer; }
    .provider-chip:hover { border-color:var(--accent); color:var(--accent); }
    .provider-chip img { width:20px; height:20px; border-radius:4px; }
    .no-providers { font-size:12.5px; color:var(--muted); }

    /* SIMILAR */
    .similar-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
    .similar-scroll::-webkit-scrollbar { display:none; }
    .sim-card { flex-shrink:0; width:90px; cursor:pointer; }
    .sim-card img { width:90px; height:135px; object-fit:cover; border-radius:7px; background:var(--surface); display:block; transition:transform 0.15s; }
    .sim-card:hover img { transform:scale(1.04); }
    .sim-title { font-size:11px; font-weight:600; color:var(--text); margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* WATCH BOX */
    .watch-box { padding:10px 13px; background:var(--surface); border-radius:8px; margin-bottom:13px; border-left:3px solid var(--gold); }
    .watch-box-title { font-size:11px; font-weight:700; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }

    /* ACTIONS */
    .modal-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:9px 17px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; border:none; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-dark); }
    .btn-secondary { border:1px solid var(--border); background:transparent; color:var(--text); }
    .btn-secondary:hover { border-color:var(--muted); }
    .btn-saved { background:var(--text); color:var(--bg); }

    /* SECTION DIVIDER */
    .modal-section { margin:14px 0 8px; font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); }

    /* FOOTER */
    .site-footer { border-top:1px solid var(--border); padding:1.5rem; text-align:center; color:var(--muted); font-size:12px; }
    .site-footer a { color:var(--muted); text-decoration:none; }
    .site-footer a:hover { color:var(--accent); }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="10" fill="#161412"/>
        <rect x="6" y="6" width="52" height="14" rx="2" fill="#e50914"/>
        <g fill="#161412">
          <rect x="10" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="22" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="34" y="9" width="6" height="8" transform="skewX(-12)"/>
          <rect x="46" y="9" width="6" height="8" transform="skewX(-12)"/>
        </g>
        <rect x="6" y="24" width="52" height="34" rx="2" fill="none" stroke="#e50914" stroke-width="1.5"/>
        <polygon points="26,32 26,50 44,41" fill="#f0ece4"/>
      </svg>
      <div class="brand-text">
        <h1>FLICKR</h1>
        <p>free movie discovery &middot; no piracy &middot; just vibes</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="./index.html">search</a>
      <a href="./blog/index.html">blog</a>
      <button class="dark-btn" onclick="toggleDark()" id="darkBtn">🌙 dark</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="search any movie..." oninput="handleInput(this.value)" onkeydown="if(event.key==='Enter')doSearch()" />
      <button onclick="doSearch()">Search</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>

<div class="genres" id="genres"></div>

<div class="tabs-row">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('search',this)">discover</div>
    <div class="tab" onclick="switchTab('watchlist',this)" id="wlTab">watchlist (0)</div>
  </div>
  <div class="filters">
    <select onchange="minRating=+this.value;renderResults()">
      <option value="0">all ratings</option>
      <option value="6">6+ ⭐</option>
      <option value="7">7+ ⭐</option>
      <option value="8">8+ ⭐</option>
    </select>
    <select onchange="sortBy=this.value;renderResults()">
      <option value="default">default</option>
      <option value="rating">top rated</option>
      <option value="year">newest</option>
    </select>
  </div>
</div>

<div class="content">
  <div id="tab-search">
    <div id="status"></div>
    <div class="ad-slot ad-banner">
      <ins class="adsbygoogle" style="display:block;width:100%;height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000000" data-ad-format="horizontal"></ins>
    </div>
    <div id="sectionLabel" class="section-label">trending this week</div>
    <div class="grid" id="grid"></div>
  </div>
  <div id="tab-watchlist" style="display:none">
    <div id="wlContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<div class="site-footer">
  &copy; 2026 Flickr &middot; <a href="./blog/index.html">blog</a> &middot; <a href="./privacy.html">privacy policy</a> &middot; powered by TMDB
</div>

<script>
const TMDB_KEY = '8019621507160959e76e235a067e8d77';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p';

let results = [], watchlist = [], minRating = 0, sortBy = 'default';
let suggestTimer = null, selectedMovie = null, isDark = false;

const GENRES_MAP = {
  28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',
  18:'Drama',27:'Horror',10749:'Romance',878:'Sci-Fi',53:'Thriller',
  9648:'Mystery',10402:'Music',36:'History'
};
const GENRE_IDS = Object.keys(GENRES_MAP);

const LOGO = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="10" fill="var(--surface)"/>
  <rect x="6" y="6" width="52" height="14" rx="2" fill="var(--accent)"/>
  <g fill="var(--surface)">
    <rect x="10" y="9" width="6" height="8" transform="skewX(-12)"/>
    <rect x="22" y="9" width="6" height="8" transform="skewX(-12)"/>
    <rect x="34" y="9" width="6" height="8" transform="skewX(-12)"/>
    <rect x="46" y="9" width="6" height="8" transform="skewX(-12)"/>
  </g>
  <rect x="6" y="24" width="52" height="34" rx="2" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
  <polygon points="26,32 26,50 44,41" fill="var(--muted)"/>
</svg>`;

// Build genre pills
const gc = document.getElementById('genres');
const allBtn = document.createElement('button');
allBtn.className = 'genre-btn active'; allBtn.textContent = 'all';
allBtn.onclick = () => { setActiveGenre(null); loadTrending(); };
gc.appendChild(allBtn);
GENRE_IDS.forEach(id => {
  const b = document.createElement('button');
  b.className = 'genre-btn'; b.textContent = GENRES_MAP[id];
  b.onclick = () => { setActiveGenre(id, b); browseGenre(id); };
  gc.appendChild(b);
});

function setActiveGenre(id, btn) {
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active'); else allBtn.classList.add('active');
}

function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkBtn').textContent = isDark ? '☀️ light' : '🌙 dark';
}

// --- SEARCH ---
function handleInput(v) {
  clearTimeout(suggestTimer);
  const box = document.getElementById('suggestions');
  if (v.length < 2) { box.style.display = 'none'; return; }
  suggestTimer = setTimeout(() => fetchSuggestions(v), 350);
}

async function fetchSuggestions(q) {
  try {
    const r = await fetch(`${TMDB}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&page=1`);
    const d = await r.json();
    if (!d.results?.length) return;
    const box = document.getElementById('suggestions');
    box.innerHTML = d.results.slice(0,6).map(m => `
      <div class="sug-item" onclick="selectSug(${m.id},'${escape(m.title)}')">
        <img src="${m.poster_path ? IMG+'/w45'+m.poster_path : ''}" onerror="this.style.background='#2a2620';this.removeAttribute('src')" />
        <span>${m.title}</span>
        <span class="sug-year">${(m.release_date||'').slice(0,4)}</span>
      </div>`).join('');
    box.style.display = 'block';
  } catch {}
}

function selectSug(id, title) {
  document.getElementById('searchInput').value = unescape(title);
  document.getElementById('suggestions').style.display = 'none';
  openModal(id);
}

async function doSearch() {
  document.getElementById('suggestions').style.display = 'none';
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadTrending(); return; }
  setStatus('loader','searching...');
  document.getElementById('sectionLabel').textContent = `results for "${q}"`;
  try {
    const r = await fetch(`${TMDB}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&page=1`);
    const d = await r.json();
    results = d.results || [];
    setStatus('','');
    renderResults();
  } catch { setStatus('err','search failed — check your connection'); }
}

async function loadTrending() {
  setStatus('loader','loading...');
  document.getElementById('sectionLabel').textContent = 'trending this week';
  document.getElementById('searchInput').value = '';
  try {
    const r = await fetch(`${TMDB}/trending/movie/week?api_key=${TMDB_KEY}`);
    const d = await r.json();
    results = d.results || [];
    setStatus('','');
    renderResults();
  } catch { setStatus('err','failed to load trending'); }
}

async function browseGenre(id) {
  setStatus('loader','loading...');
  document.getElementById('sectionLabel').textContent = GENRES_MAP[id];
  try {
    const r = await fetch(`${TMDB}/discover/movie?api_key=${TMDB_KEY}&with_genres=${id}&sort_by=popularity.desc&page=1`);
    const d = await r.json();
    results = d.results || [];
    setStatus('','');
    renderResults();
  } catch { setStatus('err','failed to load genre'); }
}

function setStatus(type, msg) {
  const s = document.getElementById('status');
  if (type === 'loader') s.innerHTML = `<div class="loader-row"><div class="spinner"></div><span>${msg}</span></div>`;
  else if (type === 'err') s.innerHTML = `<div class="err">${msg}</div>`;
  else s.innerHTML = '';
}

function getSorted() {
  let list = results.filter(m => !minRating || (m.vote_average >= minRating));
  if (sortBy === 'rating') list.sort((a,b) => b.vote_average - a.vote_average);
  if (sortBy === 'year') list.sort((a,b) => (b.release_date||'').localeCompare(a.release_date||''));
  return list;
}

function renderResults() {
  const grid = document.getElementById('grid');
  const list = getSorted();
  if (!list.length) {
    grid.innerHTML = `<div class="empty">${LOGO}<p>no results — try a different search or genre</p></div>`;
    return;
  }
  grid.innerHTML = list.map((m,i) => {
    const poster = m.poster_path ? `${IMG}/w300${m.poster_path}` : '';
    const year = (m.release_date||'').slice(0,4);
    const rating = m.vote_average ? m.vote_average.toFixed(1) : '';
    const adSlot = (i > 0 && i % 8 === 7) ? `<div class="ad-slot ad-grid" style="min-height:120px"><ins class="adsbygoogle" style="display:block;width:100%;height:100%" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000002" data-ad-format="fluid" data-ad-layout-key="-6t+ed+2i-1n-4w"></ins></div>` : '';
    return `<div class="card" onclick="openModal(${m.id})">
      <div class="card-poster-wrap">
        <img src="${poster}" alt="${m.title}" onerror="this.style.background='var(--surface)';this.removeAttribute('src')"/>
        ${rating ? `<div class="card-badge">★ ${rating}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${year}</div>
      </div>
    </div>${adSlot}`;
  }).join('');
  pushAd();
}

// --- MODAL ---
async function openModal(id) {
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modal').innerHTML = '<div class="loader-row" style="padding:3rem 1.5rem"><div class="spinner"></div><span>loading...</span></div>';

  try {
    const [detailRes, videosRes, creditsRes, providersRes, similarRes] = await Promise.all([
      fetch(`${TMDB}/movie/${id}?api_key=${TMDB_KEY}`),
      fetch(`${TMDB}/movie/${id}/videos?api_key=${TMDB_KEY}`),
      fetch(`${TMDB}/movie/${id}/credits?api_key=${TMDB_KEY}`),
      fetch(`${TMDB}/movie/${id}/watch/providers?api_key=${TMDB_KEY}`),
      fetch(`${TMDB}/movie/${id}/similar?api_key=${TMDB_KEY}&page=1`)
    ]);

    const [m, videos, credits, providers, similar] = await Promise.all([
      detailRes.json(), videosRes.json(), creditsRes.json(),
      providersRes.json(), similarRes.json()
    ]);

    selectedMovie = m;
    const inWL = watchlist.some(w => w.id === m.id);

    // Trailer
    const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube')
      || videos.results?.find(v => v.site === 'YouTube');
    const backdropUrl = m.backdrop_path ? `${IMG}/w780${m.backdrop_path}` : (m.poster_path ? `${IMG}/w780${m.poster_path}` : '');

    // Cast (top 10)
    const cast = (credits.cast || []).slice(0, 10);
    const castHTML = cast.length ? `
      <div class="modal-section">cast</div>
      <div class="cast-scroll">${cast.map(c => `
        <div class="cast-card">
          <img src="${c.profile_path ? IMG+'/w92'+c.profile_path : ''}" onerror="this.style.background='var(--surface)';this.removeAttribute('src')" />
          <div class="cast-name">${c.name}</div>
          <div class="cast-char">${c.character}</div>
        </div>`).join('')}
      </div>` : '';

    // Director
    const director = (credits.crew || []).find(c => c.job === 'Director');

    // Providers (NG first, fallback US)
    const provData = providers.results;
    const regionData = provData?.NG || provData?.US || null;
    const flatrate = regionData?.flatrate || [];
    const rent = regionData?.rent || [];
    const allProviders = [...new Map([...flatrate,...rent].map(p => [p.provider_id, p])).values()].slice(0,6);
    const providerLinks = {
      'Netflix': 'https://www.netflix.com/search?q=',
      'Amazon Prime Video': 'https://www.amazon.com/s?k=',
      'Disney Plus': 'https://www.disneyplus.com/search/',
      'Apple TV Plus': 'https://tv.apple.com/search?term=',
      'HBO Max': 'https://play.max.com/search?q=',
      'Max': 'https://play.max.com/search?q=',
      'Hulu': 'https://www.hulu.com/search?q=',
      'Paramount Plus': 'https://www.paramountplus.com/search/',
      'Showmax': 'https://www.showmax.com/eng/search?q=',
    };
    const providersHTML = allProviders.length
      ? `<div class="modal-section">where to watch</div>
         <div class="providers-row">${allProviders.map(p => {
           const base = providerLinks[p.provider_name] || `https://www.justwatch.com/us/search?q=`;
           const href = base + encodeURIComponent(m.title);
           return `<a class="provider-chip" href="${href}" target="_blank" rel="noopener">
             <img src="https://image.tmdb.org/t/p/w45${p.logo_path}" onerror="this.remove()" />
             ${p.provider_name}
           </a>`;
         }).join('')}
         </div>`
      : `<div class="modal-section">where to watch</div>
         <p class="no-providers" style="margin-bottom:13px">not available on major streaming platforms right now</p>`;

    // Similar
    const simMovies = (similar.results || []).slice(0,10).filter(s => s.poster_path);
    const similarHTML = simMovies.length ? `
      <div class="modal-section">you might also like</div>
      <div class="similar-scroll">${simMovies.map(s => `
        <div class="sim-card" onclick="openModal(${s.id})">
          <img src="${IMG}/w185${s.poster_path}" alt="${s.title}" />
          <div class="sim-title">${s.title}</div>
        </div>`).join('')}
      </div>` : '';

    // Genres
    const genres = (m.genres||[]).map(g => `<span class="genre-tag">${g.name}</span>`).join('');

    // Stars
    const score = Math.round((m.vote_average / 10) * 5);
    const stars = Array.from({length:5},(_,i) => `<span style="color:${i<score?'var(--gold)':'var(--border)'}">★</span>`).join('');

    // Runtime
    const runtime = m.runtime ? `${Math.floor(m.runtime/60)}h ${m.runtime%60}m` : '';

    document.getElementById('modal').innerHTML = `
      <div class="trailer-wrap" style="position:relative;">
        <img src="${backdropUrl}" id="trailerThumb" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.background='var(--surface)';this.removeAttribute('src')"/>
        <div class="modal-banner-overlay"></div>
        ${trailer ? `<div class="trailer-play-btn" id="playBtn" onclick="loadTrailer('${trailer.key}')">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="32" fill="rgba(229,9,20,0.88)"/>
            <polygon points="25,18 25,46 48,32" fill="#fff"/>
          </svg>
        </div>` : ''}
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-banner-text" style="z-index:5;position:absolute;bottom:14px;left:16px;right:16px;">
          <div class="modal-title">${m.title}</div>
          <div class="modal-sub">${(m.release_date||'').slice(0,4)}${runtime ? ' · '+runtime : ''}${m.vote_average ? ' · ★ '+m.vote_average.toFixed(1) : ''}</div>
        </div>
      </div>
      <div class="modal-body">
        <div class="stars-row"><div class="stars">${stars}</div><span class="stars-sub">${m.vote_average?.toFixed(1)}/10 (${m.vote_count?.toLocaleString()} votes)</span></div>
        <div class="genre-tags">${genres}</div>
        <p class="plot">${m.overview || 'No description available.'}</p>
        ${director ? `<p class="meta-line"><strong>director</strong> <span>${director.name}</span></p>` : ''}
        ${castHTML}
        ${providersHTML}
        ${similarHTML}
        <div class="ad-slot" style="margin-bottom:13px;min-height:80px;">
          <ins class="adsbygoogle" style="display:block;width:100%;height:80px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="0000000001" data-ad-format="horizontal"></ins>
        </div>
        <div class="modal-actions">
          <button class="btn ${inWL?'btn-saved':'btn-primary'}" onclick="toggleWL()">${inWL?'✓ saved':'+ watchlist'}</button>
          <button class="btn btn-secondary" onclick="closeModal()">close</button>
        </div>
      </div>`;
    pushAd();
  } catch(e) {
    document.getElementById('modal').innerHTML = `<div class="err" style="padding:2rem">failed to load movie details</div>`;
  }
}

function loadTrailer(key) {
  const wrap = document.getElementById('modal').querySelector('.trailer-wrap');
  // Try inline embed first
  wrap.innerHTML = `
    <iframe 
      id="trailerFrame"
      src="https://www.youtube.com/embed/${key}?autoplay=1&rel=0&modestbranding=1" 
      allowfullscreen 
      allow="autoplay; encrypted-media; picture-in-picture"
      style="position:absolute;inset:0;width:100%;height:100%;border:none;"
    ></iframe>
    <div id="trailerFallbackBtn" style="position:absolute;bottom:12px;right:12px;z-index:10;">
      <a href="https://www.youtube.com/watch?v=${key}" target="_blank" rel="noopener"
        style="background:rgba(0,0,0,0.75);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px;">
        ▶ Open on YouTube
      </a>
    </div>`;
}

function showTrailerFallback(wrap, key) {
  const ytUrl = `https://www.youtube.com/watch?v=${key}`;
  wrap.innerHTML = `
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;gap:14px;padding:1.5rem;">
      <svg width="52" height="52" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="32" fill="#e50914"/><polygon points="25,18 25,46 48,32" fill="#fff"/></svg>
      <p style="color:#f0ece4;font-size:13.5px;font-weight:600;text-align:center;margin:0;">Trailer blocked by your browser</p>
      <a href="${ytUrl}" target="_blank" rel="noopener"
        style="background:#e50914;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;">
        ▶ Watch on YouTube
      </a>
    </div>`;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('modal').innerHTML = '';
  }
}

function toggleWL() {
  const m = selectedMovie;
  const idx = watchlist.findIndex(w => w.id === m.id);
  if (idx > -1) watchlist.splice(idx,1); else watchlist.push(m);
  updateWLCount();
  renderWatchlist();
  closeModal();
}

function updateWLCount() {
  document.getElementById('wlTab').textContent = `watchlist (${watchlist.length})`;
}

function renderWatchlist() {
  const c = document.getElementById('wlContent');
  if (!watchlist.length) {
    c.innerHTML = `<div class="empty">${LOGO}<p>nothing saved yet</p></div>`;
    return;
  }
  c.innerHTML = watchlist.map(m => `
    <div class="wl-item">
      <img class="wl-poster" src="${m.poster_path ? IMG+'/w92'+m.poster_path : ''}" onerror="this.style.background='var(--surface)'" />
      <div>
        <div class="wl-title">${m.title}</div>
        <div class="wl-sub">${(m.release_date||'').slice(0,4)}${m.vote_average ? ' · ★ '+m.vote_average.toFixed(1) : ''}</div>
      </div>
      <button class="wl-remove" onclick="removeWL(${m.id})">remove</button>
    </div>`).join('');
}

function removeWL(id) {
  watchlist = watchlist.filter(w => w.id !== id);
  updateWLCount();
  renderWatchlist();
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-search').style.display = name==='search' ? 'block' : 'none';
  document.getElementById('tab-watchlist').style.display = name==='watchlist' ? 'block' : 'none';
}

function pushAd() {
  try {
    document.querySelectorAll('ins.adsbygoogle').forEach(el => {
      if (!el.getAttribute('data-ad-status')) {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      }
    });
  } catch(e) {}
}

// Close suggestions on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});

// Boot
loadTrending();
renderWatchlist();
pushAd();
</script>
</body>
</html>
